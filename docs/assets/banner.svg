<svg width="1280" height="360" viewBox="0 0 1280 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#18C98B"/>
      <stop offset="1" stop-color="#2FE6A8"/>
    </linearGradient>
    <radialGradient id="bg" cx="0.7" cy="0.4" r="0.8">
      <stop offset="0" stop-color="#0D1512"/>
      <stop offset="1" stop-color="#060A08"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="360" fill="url(#bg)"/>
  <!-- faint full-width pulse -->
  <path d="M0 300 H300 L360 120 L470 470 L540 200 L600 320 H1280"
        fill="none" stroke="#18C98B" stroke-opacity="0.10" stroke-width="10"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- logo tile -->
  <g transform="translate(96,96)">
    <rect width="168" height="168" rx="40" fill="#060A08" stroke="#1B2620" stroke-width="2"/>
    <path d="M22 84 H62 L78 44 L106 132 L122 70 L138 96 H150"
          fill="none" stroke="url(#pulse)" stroke-width="9"
          stroke-linecap="round" stroke-linejoin="round" transform="translate(0,0) scale(1)"/>
    <circle cx="150" cy="96" r="7" fill="#2FE6A8"/>
  </g>
  <!-- wordmark -->
  <text x="312" y="168" font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="104" font-weight="800" fill="#F4F7F5" letter-spacing="2">NOOP</text>
  <text x="316" y="226" font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="30" font-weight="500" fill="#8B9690">Your strap. Your data. Your machine.</text>
  <text x="316" y="266" font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="24" font-weight="500" fill="#18C98B">A local-first companion for WHOOP straps. No cloud, no account.</text>
</svg>
