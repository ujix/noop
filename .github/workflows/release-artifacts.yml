# Build distributable artifacts for all platforms when code changes.
# On version-bump commits (message starts with "vX.Y.Z —") a GitHub Release is
# also created automatically, with the commit description as release notes and
# all three artifacts attached.
#
# Triggers on code/project file changes only — README, docs, and CI-only
# commits do not trigger a build. To manually cut a release, use
# "Run workflow" (workflow_dispatch) from the Actions tab.
#
# Signing policy: no secrets, no signing identity — matches the project's
# anonymity policy. The unsigned IPA is suitable for AltStore (which re-signs on
# install). The macOS .app is unsigned; users right-click → Open to bypass
# Gatekeeper. The Android APK uses the Android debug key automatically.
name: Release Artifacts

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'Strand/**'
      - 'StrandiOS/**'
      - 'StrandiOSShared/**'
      - 'StrandiOSWidgets/**'
      - 'Packages/**'
      - 'project.yml'
      - '.github/workflows/release-artifacts.yml'
  workflow_dispatch:

concurrency:
  group: release-artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Detect version + whether this commit is a release ──────────────────────
  setup:
    name: Detect version
    runs-on: ubuntu-latest
    outputs:
      version:    ${{ steps.meta.outputs.version }}
      is_release: ${{ steps.meta.outputs.is_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version and detect release commit
        id: meta
        run: |
          VERSION=$(grep 'versionName = ' android/app/build.gradle.kts \
            | sed 's/.*"\(.*\)".*/\1/')
          SUBJECT=$(git log -1 --format=%s)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if echo "$SUBJECT" | grep -qE "^v${VERSION}[[:space:]]"; then
            echo "is_release=true"  >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  # ─── Android APK ────────────────────────────────────────────────────────────
  android-apk:
    name: Android APK
    needs: setup
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: python3 -c "import base64,os; d=os.environ['KEYSTORE_B64'].strip('﻿ \t\n\r'); open('noop-release.jks','wb').write(base64.b64decode(d))"

      - name: Write keystore.properties
        env:
          STORE_PASS: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASS:   ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          SP=$(printf '%s' "$STORE_PASS" | tr -d '\n\r\t ')
          KP=$(printf '%s' "$KEY_PASS"   | tr -d '\n\r\t ')
          printf 'storeFile=noop-release.jks\nstorePassword=%s\nkeyAlias=noop-release\nkeyPassword=%s\n' \
            "$SP" "$KP" > keystore.properties

      - name: Build release APK
        run: ./gradlew assembleFullRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/full/release/app-full-release.apk \
             app/build/outputs/apk/full/release/Noop-${{ needs.setup.outputs.version }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: noop-android-${{ github.sha }}
          path: android/app/build/outputs/apk/full/release/Noop-${{ needs.setup.outputs.version }}.apk
          retention-days: 30

  # ─── macOS .app + iOS .ipa ──────────────────────────────────────────────────
  apple:
    name: macOS .app + iOS .ipa
    needs: setup
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # ── macOS ──
      - name: Archive macOS app
        run: >-
          xcodebuild archive
          -scheme Strand
          -configuration Release
          -destination 'platform=macOS'
          -archivePath '${{ runner.temp }}/Strand.xcarchive'
          SKIP_INSTALL=NO
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO

      - name: Package macOS .app → zip
        run: |
          APP=$(find '${{ runner.temp }}/Strand.xcarchive/Products' -name '*.app' -maxdepth 3 | head -1)
          cd "$(dirname "$APP")"
          zip -r '${{ runner.temp }}/Noop-macOS-${{ needs.setup.outputs.version }}.zip' "$(basename "$APP")"

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: noop-macos-${{ github.sha }}
          path: ${{ runner.temp }}/Noop-macOS-${{ needs.setup.outputs.version }}.zip
          retention-days: 30

      # ── iOS ──
      - name: Archive iOS app
        run: >-
          xcodebuild archive
          -scheme NOOPiOS
          -configuration Release
          -destination 'generic/platform=iOS'
          -archivePath '${{ runner.temp }}/NOOPiOS.xcarchive'
          SKIP_INSTALL=NO
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO

      - name: Package iOS .app → .ipa
        run: |
          mkdir -p '${{ runner.temp }}/Payload'
          APP=$(find '${{ runner.temp }}/NOOPiOS.xcarchive/Products' -name '*.app' -maxdepth 3 | head -1)
          cp -R "$APP" '${{ runner.temp }}/Payload/'
          cd '${{ runner.temp }}'
          zip -r 'Noop-iOS-${{ needs.setup.outputs.version }}.ipa' Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: noop-ios-${{ github.sha }}
          path: ${{ runner.temp }}/Noop-iOS-${{ needs.setup.outputs.version }}.ipa
          retention-days: 30

  # ─── GitHub Release (version-bump commits only) ──────────────────────────────
  publish-release:
    name: Publish GitHub Release
    needs: [setup, android-apk, apple]
    if: needs.setup.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release notes
        run: |
          SUBJECT=$(git log -1 --format=%s)
          DESC=$(echo "$SUBJECT" | sed 's/^v[0-9][0-9.]*[[:space:]]*[—-][[:space:]]*//')
          {
            echo "$DESC"
            echo ""
            echo "| Platform | File | Notes |"
            echo "|---|---|---|"
            echo "| Android | \`Noop-${VERSION}.apk\` | Release-signed; sideload directly |"
            echo "| iOS | \`Noop-iOS-${VERSION}.ipa\` | Unsigned — install via AltStore |"
            echo "| macOS | \`Noop-macOS-${VERSION}.zip\` | Unsigned .app; right-click → Open |"
          } > /tmp/release-notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            "artifacts/noop-android-${{ github.sha }}/Noop-${VERSION}.apk" \
            "artifacts/noop-macos-${{ github.sha }}/Noop-macOS-${VERSION}.zip" \
            "artifacts/noop-ios-${{ github.sha }}/Noop-iOS-${VERSION}.ipa"
